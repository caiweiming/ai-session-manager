<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Session Manager</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        background: #0f111a;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background:
          radial-gradient(1200px 520px at 8% -20%, rgba(99, 102, 241, 0.2), transparent 58%),
          radial-gradient(1200px 520px at 110% 120%, rgba(14, 165, 233, 0.12), transparent 62%),
          #0f111a;
        color: #e2e8f0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        transition: opacity 0.18s ease;
      }
      #boot-splash.done {
        opacity: 0;
        pointer-events: none;
      }
      .boot-strip {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 14px;
        border: 1px solid rgba(45, 49, 66, 0.88);
        border-radius: 10px;
        background: rgba(21, 24, 34, 0.84);
        box-shadow: 0 10px 22px rgba(8, 10, 16, 0.32);
        padding: 9px 10px 10px;
      }
      .boot-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #94a3b8;
        font-size: 12px;
      }
      .boot-app {
        color: #cbd5e1;
        font-weight: 600;
      }
      .boot-spinner {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid rgba(99, 102, 241, 0.22);
        border-top-color: #818cf8;
        animation: boot-spin 0.7s linear infinite;
      }
      .boot-track {
        margin-top: 7px;
        height: 3px;
        width: 100%;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.15);
        overflow: hidden;
      }
      .boot-progress {
        height: 100%;
        width: 30%;
        border-radius: 999px;
        background: linear-gradient(90deg, #6366f1 0%, #60a5fa 100%);
        animation: boot-slide 1s ease-in-out infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(340%);
        }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-strip">
        <div class="boot-line">
          <span class="boot-spinner"></span>
          <span><span class="boot-app">AI Session Manager</span> 正在启动界面...</span>
        </div>
        <div class="boot-track"><div class="boot-progress"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
